<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ticket | Datastraw CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-700 text-white px-6 py-4 flex justify-between items-center shadow">
        <h1 class="text-xl font-bold">Datastraw Support CRM</h1>
        <a href="/" class="bg-white text-blue-700 px-4 py-2 rounded font-semibold hover:bg-blue-50">← Back to Tickets</a>
    </nav>

    <div class="max-w-2xl mx-auto p-6">
        <div class="bg-white rounded shadow p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Create New Support Ticket</h2>
            <form action="/api/tickets" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Customer Name *</label>
                    <input type="text" name="customer_name" required placeholder="John Doe"
                        class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Customer Email *</label>
                    <input type="email" name="customer_email" required placeholder="john@example.com"
                        class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Issue Subject *</label>
                    <input type="text" name="subject" required placeholder="Brief description of the issue"
                        class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description *</label>
                    <textarea name="description" required rows="5" placeholder="Detailed description of the problem..."
                        class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded font-semibold hover:bg-blue-700 transition">
                    Submit Ticket
                </button>
            </form>
        </div>
    </div>
</body>
</html>
